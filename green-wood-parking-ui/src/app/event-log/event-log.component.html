<h2 mat-dialog-title>История событий</h2>

<mat-dialog-content>
  <div class="event-list">
    @for (event of events() | keyvalue: compareDates; track event.key) {
      <div class="event-item">
        <span class="event-time">
          {{ event.key | date: 'HH:mm:ss' }}
        </span>
        <span class="event-message">
          {{ event.value }}
        </span>
      </div>
    } @empty {
      <p>Событий пока нет</p>
    }
  </div>
</mat-dialog-content>
