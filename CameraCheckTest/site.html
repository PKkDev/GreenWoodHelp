<!DOCTYPE html>
<html>
<head>
    <title>Яндекс Карта</title>
    <script src="https://api-maps.yandex.ru/v3/?apikey=22ccc084-055d-4abd-933d-2d29a9ee787b&lang=ru_RU"></script>
    <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>

        window.map = null;

        initMap();

        async function initMap() {
            // Промис `ymaps3.ready` будет зарезолвлен, когда загрузятся все компоненты основного модуля API
            await ymaps3.ready;
            const {
                YMap,
                YMapDefaultSchemeLayer,
                YMapFeatureDataSource,
                YMapLayer,
                YMapFeature,
                YMapListener,
                YMapDefaultFeaturesLayer,
                YMapMarker,
                YMapCollection
            } = ymaps3;

            map = new YMap(
                document.getElementById('map'),
                {
                    location: {
                        center: [49.340300, 53.526747],
                        zoom: 18
                    },
                    showScaleInCopyrights: false
                }, [
                new YMapDefaultSchemeLayer(),
                new YMapFeatureDataSource({ id: 'featureSource', dynamic: false }),
                new YMapLayer({ type: 'features', source: 'featureSource', zIndex: 1400 }),
            ]
            );


            const listener = new YMapListener({
                onClick: (object) => {
                    console.log(object);
                }
            });

            map.addChild(listener);
        }

        setTimeout(() => {

            const getparkingPlace = (id, coordinates) => {
                return new ymaps3.YMapFeature({
                    id: id,
                    source: 'featureSource',
                    geometry: {
                        type: 'Polygon',
                        coordinates: coordinates
                    },
                    style: {
                        stroke: [{ width: 2, color: '#3bb300' }],
                        fill: '#f43'
                    }
                });
            }

            const p29 = getparkingPlace(
                'p29',
                [[
                    [49.341242, 53.527888],
                    [49.341309, 53.527887],
                    [49.341272, 53.527757],
                    [49.341197, 53.527748]
                ]]);
            map.addChild(p29);

            const p28 = getparkingPlace(
                'p28',
                [[
                    [49.341223, 53.527740],
                    [49.341400, 53.527722],
                    [49.341352, 53.527554],
                    [49.341146, 53.527561]
                ]]);
            map.addChild(p28);

            const p30 = getparkingPlace(
                'p30',
                [[
                    [49.341264, 53.527300],
                    [49.341309, 53.527297],
                    [49.341266, 53.527094],
                    [49.341215, 53.527097]
                ]]);
            map.addChild(p30);

            const p31 = getparkingPlace(
                'p31',
                [[
                    [49.341290, 53.527543],
                    [49.341368, 53.527535],
                    [49.341325, 53.527318],
                    [49.341272, 53.527323]
                ]]);
            map.addChild(p31);

            const p21 = getparkingPlace(
                'p21',
                [[
                    [49.341121, 53.527043],
                    [49.341269, 53.527033],
                    [49.341229, 53.526832],
                    [49.341076, 53.526837]
                ]]);
            map.addChild(p21);
            const p22 = getparkingPlace(
                'p22',
                [[
                    [49.341068, 53.526805],
                    [49.341223, 53.526789],
                    [49.341199, 53.526634],
                    [49.341001, 53.526643]
                ]]);
            map.addChild(p22);
        }, 1000 * 1)

    </script>
</body>
</html>
